<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Command Runner</title>
<style>
  body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
  input { width: 80%; padding: 8px; margin-bottom: 10px; background: #222; color: #0f0; border: none; }
  button { padding: 8px 12px; }
  pre { background: #222; padding: 10px; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>Run OS Command</h2>
<input type="text" id="cmd" placeholder="Type command like 'ls'" />
<button onclick="runCommand()">Run</button>
<pre id="output"></pre>

<script>
async function runCommand() {
    const cmd = document.getElementById("cmd").value;
    const res = await fetch("/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command: cmd })
    });
    const data = await res.json();
    document.getElementById("output").textContent = data.output || data.error;
}
</script>
</body>
</html>
